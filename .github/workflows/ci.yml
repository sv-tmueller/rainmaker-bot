name: ci
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  python:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
      - name: Sync dependencies
        run: uv sync
      - name: Lint
        run: uv run ruff check .
      - name: Format check
        run: uv run ruff format --check .
      - name: Type check
        run: uv run mypy src
      - name: Tests
        run: uv run pytest
  dashboard:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v6
      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build
        # The dashboard page is server-rendered on demand, so the build does not
        # reach Supabase; placeholders keep a missing-env check from failing it.
        env:
          SUPABASE_URL: https://example.invalid
          SUPABASE_SERVICE_ROLE_KEY: dummy
        run: npm run build
      - name: Test
        run: npm test
