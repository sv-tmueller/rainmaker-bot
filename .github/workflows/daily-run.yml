name: scheduled-run
on:
  schedule:
    # Every 3 hours, to refresh recommendations as forecasts and market prices
    # move intraday (#77). Discovery finds whatever US-city markets are live, so a
    # pass before the day's markets post simply re-prices the still-open ones.
    - cron: "0 */3 * * *"
  workflow_dispatch: {}
permissions:
  contents: read
  issues: write
jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true  # cache deps so 8 runs/day stay well within CI minutes
      - name: Sync dependencies
        run: uv sync
      - name: Run the bot
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          case "$DATABASE_URL" in
            postgres://*|postgresql://*) ;;
            *) echo "DATABASE_URL is not a Postgres DSN; refusing to run (would silently write to ephemeral SQLite)"; exit 1 ;;
          esac
          uv run rainmaker run
      - name: Settle past markets
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          case "$DATABASE_URL" in
            postgres://*|postgresql://*) ;;
            *) echo "DATABASE_URL is not a Postgres DSN; refusing to run"; exit 1 ;;
          esac
          uv run rainmaker settle
      - name: Prune redundant intraday rows
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          case "$DATABASE_URL" in
            postgres://*|postgresql://*) ;;
            *) echo "DATABASE_URL is not a Postgres DSN; refusing to run"; exit 1 ;;
          esac
          uv run rainmaker prune
      - name: Write tracking snapshot
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          case "$DATABASE_URL" in
            postgres://*|postgresql://*) ;;
            *) echo "DATABASE_URL is not a Postgres DSN; refusing to run"; exit 1 ;;
          esac
          uv run rainmaker snapshot
      - name: Upload report artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: report-${{ github.run_id }}
          path: reports/
          if-no-files-found: ignore
          retention-days: 7  # intraday runs are transient; keep artifact storage bounded
  notify:
    runs-on: ubuntu-latest
    needs: [run]
    if: failure()
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6
      - name: Alert on failure
        run: |
          bash scripts/notify_failure.sh \
            "scheduled-run" \
            "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
